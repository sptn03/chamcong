<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chấm Công — App Nhân viên</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Be Vietnam Pro", system-ui, sans-serif;
    background:
      radial-gradient(1100px 700px at 50% -10%, #E4F4EC 0%, transparent 60%),
      #E8ECEA;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 36px 16px;
    color: #16241D;
  }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .stage h1.t { font-size: 15px; font-weight: 700; color: #46564E; letter-spacing: .3px; margin: 0; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  input::placeholder, textarea::placeholder { color: #A6B2AB; }
  @keyframes ccFade { from { opacity: 0 } to { opacity: 1 } }
  @keyframes ccSlideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
</style>
</head>
<body>
  <div class="stage">
    <div id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script src="theme.js"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="screens-core.jsx"></script>
  <script type="text/babel" src="screens-more.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(window.CC_MobileApp));
  </script>
</body>
</html>
